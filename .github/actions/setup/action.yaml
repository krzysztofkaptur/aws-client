name: Setup project
description: Checkout, install pnpm, node and deps

runs:
  using: composite
  steps:
      - name: "setup pnpm"
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: "setup node"
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: "install packages"
        run: pnpm ci
        shell: bash